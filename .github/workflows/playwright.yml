name: "Playwright Tests & Allure Report"

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: self-hosted
    env:
      CI: true

    defaults:
      run:
        working-directory: project1-pom

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: project1-pom/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Chrome for Testing
        # --with-deps is Linux-only (apt-get); omitted for the Windows self-hosted runner.
        run: npx playwright install chrome

      - name: Run Playwright Tests
        # Runs HEADED (config defaults headed unless HEADLESS=true) so the Cloudflare JS
        # challenge on practicesoftwaretesting.com can auto-solve. The self-hosted runner
        # must run in an interactive desktop session, not as a Session-0 Windows service.
        run: npm run test:ci -- --project=chromium
        continue-on-error: true

      - name: Upload Allure Raw Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: project1-pom/allure-results
          if-no-files-found: warn
          retention-days: 14

  report:
    if: always()
    needs: [test]
    timeout-minutes: 30
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: project1-pom

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java (Required for Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: project1-pom/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Download Allure Raw Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: project1-pom/allure-results

      - name: Generate Allure Report
        run: npm run allure:generate
        continue-on-error: true

      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: project1-pom/allure-report
          if-no-files-found: warn
          retention-days: 14

      - name: Deploy to GitHub Pages
        if: always() && github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: project1-pom/allure-report
        continue-on-error: true